<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendify - Nền tảng Giáo dục</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="header fade-in">
            <h1>Atendify Admin</h1>
            <p>Đăng nhập hệ thống Cổng trường / Giảng viên</p>
        </div>

        <div class="glass-panel fade-in">
            <div class="input-group">
                <label>Mật khẩu Quản trị (Master Key)</label>
                <input type="password" id="admin-password" class="input-field" placeholder="Nhập mật khẩu..." />
            </div>
            
            <button id="admin-login-btn" class="btn mt-4">Vào Quản Trị</button>
            <div id="login-error" class="mt-2 text-center" style="display: none; color: var(--error-color); font-size: 0.875rem;"></div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">&larr; Sinh viên điểm danh?</a>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-btn').addEventListener('click', async () => {
            const password = document.getElementById('admin-password').value;
            const errorLabel = document.getElementById('login-error');
            
            const req = await fetch('api/auth/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const res = await req.json();
            
            if(res.success) {
                // Lưu token admin vào sessionStorage để không lưu dai dẳng như sinh viên
                sessionStorage.setItem('admin_token', res.adminToken);
                window.location.href = 'admin.html';
            } else {
                errorLabel.innerText = res.error || "Sai mật khẩu!";
                errorLabel.style.display = 'block';
            }
        });
    </script>
</body>
</html>
